<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⭐ KAASHVI — Interstellar Star Registry</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000005; }

    #canvas { position: fixed; inset: 0; display: block; cursor: grab; }
    #canvas:active { cursor: grabbing; }

    /* Warp overlay */
    #warp-overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; transition: opacity 1.5s ease;
    }
    #warp-text {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1rem, 3vw, 1.9rem);
      letter-spacing: 0.25em;
      color: #c0d8ff;
      text-shadow: 0 0 40px rgba(100,150,255,0.9), 0 0 80px rgba(80,120,255,0.5);
      text-align: center;
      padding: 0 2rem;
      user-select: none;
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    /* Main UI */
    #ui { position: fixed; inset: 0; z-index: 20; pointer-events: none; opacity: 0; transition: opacity 1s ease; }
    #ui.visible { opacity: 1; }

    /* Header */
    #header {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 1.8rem 2rem 2.5rem;
      background: linear-gradient(to bottom, rgba(0,0,10,0.88) 0%, transparent 100%);
      text-align: center;
      animation: fadeInDown 1.2s ease forwards;
    }
    #header-label {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.5rem, 1.1vw, 0.72rem);
      letter-spacing: 0.38em;
      color: rgba(130,170,255,0.65);
      text-transform: uppercase;
      margin-bottom: 0.45rem;
    }
    #header-name {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.5rem, 4vw, 2.6rem);
      letter-spacing: 0.22em;
      color: #e8f0ff;
      font-weight: 700;
      text-shadow: 0 0 30px rgba(100,150,255,0.6), 0 0 70px rgba(80,120,255,0.3);
    }
    #header-line {
      width: 90px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(120,160,255,0.55), transparent);
      margin: 0.7rem auto 0;
    }

    /* Star label */
    #star-label {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -62%);
      text-align: center;
      opacity: 0; transition: opacity 0.5s ease;
    }
    #star-label-inner {
      display: inline-block;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      background: rgba(5,10,35,0.55);
      border: 1px solid rgba(120,160,255,0.38);
      border-radius: 14px; padding: 0.8rem 1.8rem;
      box-shadow: 0 0 50px rgba(80,130,255,0.3), inset 0 0 20px rgba(80,130,255,0.04);
    }
    #star-label-name {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      color: #c0d4ff; letter-spacing: 0.2em;
      text-shadow: 0 0 20px rgba(120,170,255,0.8);
    }
    #star-label-sub {
      margin-top: 0.3rem; font-family: system-ui, sans-serif;
      font-size: 0.62rem; color: rgba(160,185,255,0.5); letter-spacing: 0.18em;
    }

    /* Bottom controls */
    #controls {
      position: absolute; bottom: 2rem; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
      animation: fadeInUp 1.5s ease forwards;
      pointer-events: all;
    }
    #locate-btn {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.7rem, 1.5vw, 0.85rem);
      letter-spacing: 0.2em;
      color: #a8c8ff;
      background: rgba(10,20,60,0.55);
      border: 1px solid rgba(100,150,255,0.35);
      border-radius: 100px;
      padding: 0.75rem 2rem;
      cursor: pointer;
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
      display: flex; align-items: center; gap: 0.6rem;
      outline: none;
    }
    #locate-btn:hover {
      background: rgba(30,60,160,0.6);
      border-color: rgba(140,180,255,0.6);
      color: #ffffff;
      box-shadow: 0 0 20px rgba(80,130,255,0.4);
    }
    #locate-btn.locating {
      color: #ffffff;
      background: rgba(60,100,220,0.5);
      border-color: rgba(140,180,255,0.7);
      animation: locatePulse 1.5s ease infinite;
    }
    #locate-icon { display: inline-block; font-style: normal; }
    #locate-icon.spinning { animation: starSpin 2s linear infinite; }

    #hint {
      display: inline-block;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      background: rgba(10,15,40,0.35);
      border: 1px solid rgba(100,140,255,0.14);
      border-radius: 100px; padding: 0.45rem 1.3rem;
      font-family: system-ui, sans-serif;
      font-size: 0.72rem; color: rgba(160,185,255,0.5); letter-spacing: 0.08em;
    }

    /* Warp flash */
    #warp-flash {
      position: fixed; inset: 0; z-index: 25; pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(80,130,255,0.25) 0%, transparent 70%);
      opacity: 0;
    }
    #warp-flash.active { animation: warpFlash 3s ease forwards; }

    /* Keyframes */
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp   { from { opacity: 0; transform: translateY(20px);  } to { opacity: 1; transform: translateY(0); } }
    @keyframes locatePulse {
      0%   { box-shadow: 0 0 0px rgba(100,160,255,0.6); }
      50%  { box-shadow: 0 0 30px rgba(100,160,255,0.9), 0 0 60px rgba(80,130,255,0.4), inset 0 0 20px rgba(100,160,255,0.15); }
      100% { box-shadow: 0 0 0px rgba(100,160,255,0.6); }
    }
    @keyframes starSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes warpFlash {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      80%  { opacity: 0.4; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- Warp intro overlay -->
  <div id="warp-overlay">
    <div id="warp-text"></div>
  </div>

  <!-- Warp flash (locate button effect) -->
  <div id="warp-flash"></div>

  <!-- Main UI (shown after intro) -->
  <div id="ui">
    <div id="header">
      <div id="header-label">Interstellar Star Registry</div>
      <div id="header-name">KAASHVI</div>
      <div id="header-line"></div>
    </div>

    <div id="star-label">
      <div id="star-label-inner">
        <div id="star-label-name">⭐ KAASHVI</div>
        <div id="star-label-sub">YOUR STAR</div>
      </div>
    </div>

    <div id="controls">
      <button id="locate-btn" onclick="locateStar()">
        <span id="locate-icon">✦</span>
        <span id="locate-text">Locate Your Star</span>
      </button>
      <div id="hint">Drag to explore · Scroll to zoom</div>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    const STAR_NAME = 'KAASHVI';
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // ── State ──────────────────────────────────────────────────────────────
    let W = window.innerWidth, H = window.innerHeight;
    let time = 0;
    let phase = 'warp'; // warp | explore
    let stars = [];
    let shootStar = { active: false, x:0, y:0, ex:0, ey:0, life:0 };
    let shootTimer = 3;

    // Camera
    let camX = 0, camY = 0;
    let velX = 0, velY = 0;
    let zoom = 1;
    let targetZoom = 1;

    // Drag
    let dragging = false, lastX = 0, lastY = 0;
    let pinching = false, pinchDist = 0;

    // Flying state
    let flying = false;
    let flyTargetX = 0, flyTargetY = 0, flyTargetZoom = 1.5;

    // Warp phase
    let warpOpacity = 1;
    let warpStreaks = [];

    // Near-star detection
    let nearStar = false;
    let labelOpacity = 0;

    // Special star (normalized 0–1 coords)
    const SPECIAL = { x: 0.62, y: 0.44 };

    // ── Init ───────────────────────────────────────────────────────────────
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      initStars();
    }

    function initStars() {
      stars = [];
      const count = Math.min(2200, Math.floor((W * H) / 420));
      for (let i = 0; i < count; i++) {
        const rand = Math.random();
        let color;
        if      (rand < 0.55) color = `rgba(255,255,255,${(0.4 + Math.random()*0.6).toFixed(2)})`;
        else if (rand < 0.70) color = `rgba(${160+Math.random()*40|0},${180+Math.random()*50|0},255,${(0.5+Math.random()*0.5).toFixed(2)})`;
        else if (rand < 0.82) color = `rgba(255,${180+Math.random()*50|0},${110+Math.random()*80|0},${(0.5+Math.random()*0.4).toFixed(2)})`;
        else                   color = `rgba(200,215,255,${(0.5+Math.random()*0.5).toFixed(2)})`;
        stars.push({
          x: Math.random(), y: Math.random(),
          z: 0.25 + Math.random() * 0.75,
          r: 0.3 + Math.random() * 2.0,
          color,
          twinkle: Math.random() * Math.PI * 2,
        });
      }
    }

    function initWarpStreaks() {
      warpStreaks = [];
      for (let i = 0; i < 250; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist  = 80 + Math.random() * 300;
        warpStreaks.push({
          cx: W/2, cy: H/2,
          angle, dist,
          speed: 200 + Math.random() * 600,
          len: 15 + Math.random() * 80,
          opacity: 0.3 + Math.random() * 0.7,
          progress: Math.random(),
        });
      }
    }

    resize();
    initWarpStreaks();
    window.addEventListener('resize', resize);

    // ── Cinematic sequence ─────────────────────────────────────────────────
    const warpTextEl  = document.getElementById('warp-text');
    const warpOverlay = document.getElementById('warp-overlay');
    const ui          = document.getElementById('ui');
    const starLabel   = document.getElementById('star-label');

    const sequence = [
      [800,  'Entering the Cosmos…'],
      [2600, 'Navigating Deep Space…'],
      [4400, 'Your Star Awaits…'],
      [5800, null], // fade warp
      [7200, 'explore'],
    ];

    sequence.forEach(([delay, action]) => {
      setTimeout(() => {
        if (action === null) {
          warpOverlay.style.opacity = '0';
        } else if (action === 'explore') {
          phase = 'explore';
          warpOverlay.style.display = 'none';
          ui.classList.add('visible');
        } else {
          warpTextEl.style.opacity = '0';
          warpTextEl.style.transform = 'scale(0.94)';
          setTimeout(() => {
            warpTextEl.textContent = action;
            warpTextEl.style.opacity = '1';
            warpTextEl.style.transform = 'scale(1)';
          }, 200);
        }
      }, delay);
    });

    // ── Pointer events ─────────────────────────────────────────────────────
    canvas.addEventListener('mousedown', e => {
      dragging = true; lastX = e.clientX; lastY = e.clientY;
      flying = false;
    });
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      velX = dx * 10; velY = dy * 10;
      camX += dx * 280; camY += dy * 280;
      lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('mouseup', () => { dragging = false; });

    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      targetZoom = Math.max(0.4, Math.min(3, targetZoom - e.deltaY * 0.001));
    }, { passive: false });

    canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        flying = false;
      } else if (e.touches.length === 2) {
        pinching = true;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        pinchDist = Math.sqrt(dx*dx + dy*dy);
      }
    }, { passive: true });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 1 && dragging) {
        const dx = e.touches[0].clientX - lastX, dy = e.touches[0].clientY - lastY;
        velX = dx * 10; velY = dy * 10;
        camX += dx * 280; camY += dy * 280;
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
      } else if (e.touches.length === 2 && pinching) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const d = Math.sqrt(dx*dx + dy*dy);
        targetZoom = Math.max(0.4, Math.min(3, targetZoom * (d / pinchDist)));
        pinchDist = d;
      }
    }, { passive: false });

    canvas.addEventListener('touchend', () => { dragging = false; pinching = false; });

    // ── Locate button ──────────────────────────────────────────────────────
    window.locateStar = function() {
      flying = true;
      // Target offset: bring SPECIAL to canvas center
      flyTargetX = -(SPECIAL.x - 0.5) * W * 1200;
      flyTargetY = -(SPECIAL.y - 0.5) * H * 1200;
      flyTargetZoom = 1.6;
      velX = 0; velY = 0;

      const btn      = document.getElementById('locate-btn');
      const icon     = document.getElementById('locate-icon');
      const textEl   = document.getElementById('locate-text');
      const flash    = document.getElementById('warp-flash');

      btn.classList.add('locating');
      icon.classList.add('spinning');
      textEl.textContent = 'Navigating…';
      flash.classList.remove('active');
      void flash.offsetWidth; // reflow
      flash.classList.add('active');

      setTimeout(() => {
        btn.classList.remove('locating');
        icon.classList.remove('spinning');
        textEl.textContent = 'Locate Your Star';
        flash.classList.remove('active');
      }, 3000);
    };

    // ── Easing ─────────────────────────────────────────────────────────────
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

    // ── Main render loop ───────────────────────────────────────────────────
    let lastTime = performance.now();

    function draw(now) {
      requestAnimationFrame(draw);
      const delta = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      time += delta;

      ctx.clearRect(0, 0, W, H);

      // ── BACKGROUND ──────────────────────────────────────────────────────
      const bg = ctx.createRadialGradient(W*.5, H*.5, 0, W*.5, H*.5, Math.max(W,H)*.9);
      bg.addColorStop(0,   '#060512');
      bg.addColorStop(0.4, '#030308');
      bg.addColorStop(1,   '#000003');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // Nebula blobs
      drawNebula(W*.18, H*.28, W*.38, 'rgba(28,0,75,0.20)');
      drawNebula(W*.72, H*.62, W*.30, 'rgba(0,18,75,0.16)');
      drawNebula(W*.50, H*.85, W*.25, 'rgba(8,0,55,0.14)');
      drawNebula(W*.85, H*.20, W*.20, 'rgba(0,10,60,0.10)');

      // ── WARP PHASE ──────────────────────────────────────────────────────
      if (phase === 'warp') {
        warpStreaks.forEach(s => {
          s.progress += delta * (s.speed / s.dist);
          if (s.progress > 1) s.progress = 0;
          const t1 = easeOut(s.progress);
          const t2 = easeOut(Math.min(1, s.progress + s.len / s.dist));
          const x1 = W/2 + Math.cos(s.angle) * s.dist * t1;
          const y1 = H/2 + Math.sin(s.angle) * s.dist * t1;
          const x2 = W/2 + Math.cos(s.angle) * s.dist * t2;
          const y2 = H/2 + Math.sin(s.angle) * s.dist * t2;
          const grad = ctx.createLinearGradient(x1, y1, x2, y2);
          grad.addColorStop(0, 'rgba(180,210,255,0)');
          grad.addColorStop(1, `rgba(180,210,255,${s.opacity * Math.min(1, s.progress * 3)})`);
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.strokeStyle = grad;
          ctx.lineWidth = 1.2;
          ctx.stroke();
        });
      }

      // ── EXPLORE PHASE ───────────────────────────────────────────────────
      if (phase === 'explore') {
        // Flying animation
        if (flying) {
          camX += (flyTargetX - camX) * 0.038;
          camY += (flyTargetY - camY) * 0.038;
          targetZoom += (flyTargetZoom - targetZoom) * 0.038;
          const distLeft = Math.abs(flyTargetX - camX) + Math.abs(flyTargetY - camY);
          if (distLeft < 5) flying = false;
        } else {
          // Inertia
          velX *= 0.91; velY *= 0.91;
          camX += velX * delta; camY += velY * delta;
        }
        zoom += (targetZoom - zoom) * 0.07;
      }

      // ── STARS ───────────────────────────────────────────────────────────
      stars.forEach(s => {
        const tw = Math.sin(time * (1.4 + s.twinkle * 0.4) + s.twinkle) * 0.28 + 0.72;

        // Parallax offset per layer depth
        const px = s.x + camX * s.z * 0.000085;
        const py = s.y + camY * s.z * 0.000085;

        // Wrap
        const wx = ((px % 1) + 1) % 1;
        const wy = ((py % 1) + 1) % 1;

        const sx = (wx - 0.5) * W * zoom + W / 2;
        const sy = (wy - 0.5) * H * zoom + H / 2;

        // Cull off-screen
        if (sx < -20 || sx > W+20 || sy < -20 || sy > H+20) return;

        const radius = s.r * s.z * zoom * tw;
        if (radius < 0.15) return;

        ctx.beginPath();
        ctx.arc(sx, sy, radius, 0, Math.PI * 2);
        ctx.fillStyle = s.color;
        ctx.fill();

        // Glow for brighter stars
        if (radius > 1.1) {
          const gr = radius * 3.5;
          const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, gr);
          grd.addColorStop(0, `rgba(210,225,255,${0.07 * tw})`);
          grd.addColorStop(1, 'transparent');
          ctx.fillStyle = grd;
          ctx.fillRect(sx-gr, sy-gr, gr*2, gr*2);
        }
      });

      // ── SHOOTING STAR ───────────────────────────────────────────────────
      shootTimer -= delta;
      if (shootTimer <= 0 && !shootStar.active) {
        shootStar = {
          active: true,
          x: Math.random() * W,
          y: Math.random() * H * 0.5,
          ex: Math.random() * W * 0.6 + W * 0.2,
          ey: Math.random() * H * 0.45 + H * 0.05,
          life: 1,
        };
        shootTimer = 4 + Math.random() * 9;
      }
      if (shootStar.active) {
        const p = 1 - shootStar.life;
        const cx2 = shootStar.x + (shootStar.ex - shootStar.x) * p;
        const cy2 = shootStar.y + (shootStar.ey - shootStar.y) * p;
        const tx2 = shootStar.x + (shootStar.ex - shootStar.x) * Math.min(1, p + 0.12);
        const ty2 = shootStar.y + (shootStar.ey - shootStar.y) * Math.min(1, p + 0.12);
        ctx.beginPath();
        ctx.moveTo(cx2, cy2);
        ctx.lineTo(tx2, ty2);
        const sg = ctx.createLinearGradient(cx2, cy2, tx2, ty2);
        sg.addColorStop(0, 'rgba(255,255,255,0)');
        sg.addColorStop(1, `rgba(255,255,255,${shootStar.life})`);
        ctx.strokeStyle = sg;
        ctx.lineWidth = 2.5;
        ctx.stroke();
        shootStar.life -= delta * 0.9;
        if (shootStar.life <= 0) shootStar.active = false;
      }

      // ── SPECIAL STAR: KAASHVI ────────────────────────────────────────────
      if (phase === 'explore') {
        const pulse = 1 + Math.sin(time * 1.8) * 0.22;
        const sx = (SPECIAL.x - 0.5) * W * zoom + W/2 + camX * 0.000085 * W;
        const sy = (SPECIAL.y - 0.5) * H * zoom + H/2 + camY * 0.000085 * H;

        // Distance from screen center → nearness
        const distC = Math.sqrt((sx - W/2)**2 + (sy - H/2)**2);
        const isNear = distC < 90;
        nearStar = isNear || flying;

        // Outer glow rings
        const iBoost = nearStar ? 2.2 : 1;
        for (let g = 0; g < 5; g++) {
          const gr2 = (70 + g * 28) * pulse * iBoost;
          const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, gr2);
          grd.addColorStop(0, `rgba(70,120,255,${(0.07 - g*0.01) * iBoost})`);
          grd.addColorStop(1, 'transparent');
          ctx.fillStyle = grd;
          ctx.fillRect(sx-gr2, sy-gr2, gr2*2, gr2*2);
        }

        // Cross rays (sparkle)
        ctx.save();
        ctx.globalAlpha = 0.22 * iBoost;
        ctx.strokeStyle = '#88aaff';
        ctx.lineWidth = 1.5;
        [0, 45, 90, 135].forEach(deg => {
          const rad = deg * Math.PI / 180;
          const len = 26 * pulse * iBoost;
          ctx.beginPath();
          ctx.moveTo(sx - Math.cos(rad)*len, sy - Math.sin(rad)*len);
          ctx.lineTo(sx + Math.cos(rad)*len, sy + Math.sin(rad)*len);
          ctx.stroke();
        });
        ctx.restore();

        // Core glow
        const cg = ctx.createRadialGradient(sx, sy, 0, sx, sy, 14*pulse);
        cg.addColorStop(0,   '#ffffff');
        cg.addColorStop(0.25,'#d8e8ff');
        cg.addColorStop(0.6, '#7799ff');
        cg.addColorStop(1,   'transparent');
        ctx.fillStyle = cg;
        ctx.beginPath();
        ctx.arc(sx, sy, 14*pulse, 0, Math.PI*2);
        ctx.fill();

        // Label fade
        const labelTarget = nearStar ? 1 : 0;
        labelOpacity += (labelTarget - labelOpacity) * 0.05;
        starLabel.style.opacity = labelOpacity;
      }
    }

    function drawNebula(cx, cy, r, col) {
      const ox = camX * 0.004, oy = camY * 0.004;
      const grd = ctx.createRadialGradient(cx+ox, cy+oy, 0, cx+ox, cy+oy, r);
      grd.addColorStop(0, col);
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);
    }

    requestAnimationFrame(draw);

  })();
  </script>
</body>
</html>
